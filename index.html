<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>站点数据查看</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial,sans-serif;max-width:1200px;margin:20px auto;padding:0 15px}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #ddd;padding:8px;text-align:left;font-size:14px}
th{background:#f2f2f2}
.login-box{max-width:350px;margin:60px auto;padding:25px;border:1px solid #ccc;border-radius:8px}
.login-box input{width:100%;padding:10px;margin:8px 0;box-sizing:border-box}
.login-box button{width:100%;padding:10px;background:#28a745;color:#fff;border:none;border-radius:4px;cursor:pointer}
.logout-btn{background:#dc3545;color:#fff;border:none;padding:8px 16px;border-radius:4px;cursor:pointer;margin-bottom:10px}
.summary{background:#e9f7ef;padding:12px;border-radius:6px;margin-bottom:15px;font-weight:bold}
.error{color:red}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  var SUPABASE_URL = "https://gbedtcwsnwteneiokizp.supabase.co";
  var SUPABASE_ANON_KEY = "sb_publishable_6kqvIXFMeqXW-xmwh7GcHQ_LvfH2zon";
  var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var T = {
    loginTitle: '登录查看数据',
    emailPlaceholder: '邮箱',
    passwordPlaceholder: '密码',
    loginBtn: '登录',
    logoutBtn: '退出登录',
    summaryLoading: '加载中...',
    summaryPrefix: '累计评论：',
    noData: '暂无数据',
    loadErrorPrefix: '加载失败：',
    tableHeaders: ['站点编码','站点简称','销售单号','油品名称','手机号','姓名','CTC','TTC','评价内容','提交时间'],
    siteSummaryFail: '累计数据加载失败',
    siteSummaryNone: '暂无'
  };

  function buildUI() {
    var app = document.getElementById('app');
    var loginSec = document.createElement('div');
    loginSec.id = 'loginSection';
    loginSec.style.display = 'none';
    loginSec.innerHTML = '<div class="login-box"><h3>' + T.loginTitle + '</h3>' +
      '<input type="email" id="email" placeholder="' + T.emailPlaceholder + '" required>' +
      '<input type="password" id="password" placeholder="' + T.passwordPlaceholder + '" required>' +
      '<button id="loginBtn">' + T.loginBtn + '</button>' +
      '<p id="loginError" class="error"></p></div>';
    app.appendChild(loginSec);

    var dataSec = document.createElement('div');
    dataSec.id = 'dataSection';
    dataSec.style.display = 'none';
    dataSec.innerHTML = '<button id="logoutBtn" class="logout-btn">' + T.logoutBtn + '</button>' +
      '<div class="summary" id="summary">' + T.summaryLoading + '</div>' +
      '<table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>' +
      '<p id="dataError" class="error"></p>';
    app.appendChild(dataSec);

    var thead = document.getElementById('tableHead');
    var tr = document.createElement('tr');
    T.tableHeaders.forEach(function(h) {
      var th = document.createElement('th');
      th.textContent = h;
      tr.appendChild(th);
    });
    thead.appendChild(tr);
  }

  function showLogin() {
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('dataSection').style.display = 'none';
  }

  function showData() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dataSection').style.display = 'block';
    loadData();
    loadSummary();
  }

  async function login() {
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var errEl = document.getElementById('loginError');
    errEl.textContent = '';
    var result = await supabase.auth.signInWithPassword({ email: email, password: password });
    if (result.error) {
      errEl.textContent = T.loadErrorPrefix + result.error.message;
      return;
    }
    showData();
  }

  async function logout() {
    await supabase.auth.signOut();
    showLogin();
  }

  // 明细：从 request_logs 读取（现在只包含成功评价）
  async function loadData() {
    var result = await supabase
      .from('request_logs')
      .select('created_at, request_body')
      .order('created_at', { ascending: false });

    var tbody = document.getElementById('tableBody');
    var errEl = document.getElementById('dataError');
    tbody.innerHTML = '';
    errEl.textContent = '';

    if (result.error) {
      errEl.textContent = T.loadErrorPrefix + result.error.message;
      return;
    }
    if (!result.data || result.data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10">' + T.noData + '</td></tr>';
      return;
    }

    result.data.forEach(function(row) {
      var body = row.request_body;
      var tr = document.createElement('tr');
      var vals = [
        body.stncode,
        body.shortname,
        body.saleno,
        body.gname,
        body.mobilephone,
        body.name,
        body.ctc,
        body.ttc,
        (body.questiondata && body.questiondata.length > 0)
          ? body.questiondata[body.questiondata.length - 1].answercontent || ''
          : '',
        row.created_at
      ];
      vals.forEach(function(v) {
        var td = document.createElement('td');
        td.textContent = v !== undefined ? v : '';
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  }

  // 累计：从 request_logs 统计（与明细数据同源）
  async function loadSummary() {
    try {
      var result = await supabase
        .from('request_logs')
        .select('request_body');
      if (result.error || !result.data) {
        document.getElementById('summary').textContent = T.siteSummaryFail;
        return;
      }
      var counts = {};
      result.data.forEach(function(row) {
        var stncode = row.request_body ? row.request_body.stncode : null;
        if (stncode) {
          counts[stncode] = (counts[stncode] || 0) + 1;
        }
      });
      var items = Object.keys(counts).map(function(code) {
        return code + ': ' + counts[code] + ' 次';
      }).join(' | ');
      document.getElementById('summary').textContent = T.summaryPrefix + (items || T.siteSummaryNone);
    } catch (e) {
      document.getElementById('summary').textContent = T.siteSummaryFail;
    }
  }

  buildUI();
  document.getElementById('loginBtn').addEventListener('click', login);
  document.getElementById('logoutBtn').addEventListener('click', logout);

  (async function init() {
    var session = await supabase.auth.getSession();
    if (session.data.session) {
      showData();
    } else {
      showLogin();
    }
  })();
})();
</script>
</body>
</html>
