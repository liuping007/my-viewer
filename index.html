<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>数据中心</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ========== 科幻视觉风格（精细调校） ========== */
  :root {
    --neon-blue: #00f3ff;
    --neon-purple: #b300ff;
    --dark-bg: #0a0a0f;
    --panel-bg: rgba(10, 15, 25, 0.85);
    --border-glow: 0 0 10px rgba(0, 243, 255, 0.3);
    --text-primary: #e0f7fa;
    --text-secondary: #80deea;
    --accent: #00e5ff;
    --danger: #ff1744;
    --success: #00e676;
    --glass: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.12);
    --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
    background-attachment: fixed;
    color: var(--text-primary);
    font-family: var(--font-family);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  #particleCanvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
    will-change: transform;
  }
  body::after {
    content: "";
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 243, 255, 0.02) 2px, rgba(0, 243, 255, 0.02) 4px);
    pointer-events: none; z-index: 0;
  }
  #app {
    position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 20px;
  }
  #loginSection {
    display: flex; justify-content: center; align-items: center; min-height: 100vh;
  }
  .login-box {
    background: var(--panel-bg);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 40px 30px; width: 400px;
    box-shadow: var(--border-glow), 0 20px 40px rgba(0,0,0,0.5);
    text-align: center; animation: fadeInUp 0.6s ease;
  }
  .login-box h3 {
    font-size: 1.8rem; letter-spacing: 4px;
    color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue), 0 0 30px var(--neon-blue);
    margin-bottom: 30px; font-weight: 600;
  }
  .login-box input[type="email"],
  .login-box input[type="password"],
  .login-box input[type="text"] {
    width: 100%; padding: 14px 16px; margin: 12px 0;
    background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
    border-radius: 8px; color: white; font-size: 16px;
    outline: none; transition: all 0.3s; font-family: var(--font-family);
  }
  .login-box input:focus {
    border-color: var(--neon-blue);
    box-shadow: 0 0 12px rgba(0, 243, 255, 0.5);
    background: rgba(255,255,255,0.12);
  }
  .login-box input::placeholder { color: rgba(255,255,255,0.4); }
  .password-wrapper { position: relative; margin: 12px 0; }
  .password-wrapper input { padding-right: 45px !important; margin: 0; }
  .password-toggle {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-secondary); font-size: 1.3rem;
    cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
    transition: color 0.2s; padding: 0;
  }
  .password-toggle:hover { color: var(--neon-blue); }
  .login-box button[type="button"] {
    width: 100%; padding: 14px; margin-top: 20px;
    background: transparent; border: 2px solid var(--neon-blue);
    color: var(--neon-blue); font-size: 18px; font-weight: bold;
    letter-spacing: 3px; border-radius: 8px; cursor: pointer;
    transition: all 0.3s; text-transform: uppercase; position: relative; overflow: hidden;
  }
  .login-box button[type="button"]:hover:not(:disabled) {
    background: var(--neon-blue); color: #0a0a0f;
    box-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
  }
  .login-box button[type="button"]:disabled {
    opacity: 0.5; cursor: not-allowed; border-color: var(--text-secondary); color: var(--text-secondary);
  }
  .login-box button[type="button"]::before {
    content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: rotate(45deg); animation: btnShine 3s infinite;
  }
  @keyframes btnShine { 0% { left: -50%; } 100% { left: 150%; } }
  .remember-row {
    display: flex; align-items: center; margin-top: 15px; color: var(--text-secondary);
    font-size: 0.9rem; gap: 8px;
  }
  .remember-row input[type="checkbox"] { accent-color: var(--neon-blue); width: auto; margin: 0; }
  #loginError { color: var(--danger); margin-top: 15px; font-size: 14px; text-shadow: 0 0 8px var(--danger); min-height: 20px; }
  #dataSection { animation: fadeIn 0.5s ease; }
  .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
  .title {
    font-size: 1.8rem; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue);
    letter-spacing: 2px; font-weight: 600;
  }
  .user-email-in-title {
    font-size: 0.9rem; color: var(--text-secondary); margin-left: 12px;
    font-weight: normal; letter-spacing: normal; text-shadow: none;
  }
  .logout-btn, .admin-btn, .config-btn {
    background: transparent; padding: 8px 18px; border-radius: 6px;
    font-size: 14px; cursor: pointer; transition: all 0.3s;
    text-transform: uppercase; letter-spacing: 2px;
  }
  .logout-btn { border: 2px solid var(--danger); color: var(--danger); }
  .logout-btn:hover { background: var(--danger); color: #fff; box-shadow: 0 0 20px var(--danger); }
  .admin-btn { border-color: var(--neon-blue); color: var(--neon-blue); margin-right: 10px; }
  .admin-btn:hover { background: var(--neon-blue); color: #0a0a0f; box-shadow: 0 0 20px var(--neon-blue); }
  .config-btn { border-color: var(--success); color: var(--success); margin-right: 10px; }
  .config-btn:hover { background: var(--success); color: #0a0a0f; box-shadow: 0 0 20px var(--success); }
  .filter-bar { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-bar .filter-input { flex: 2; min-width: 150px; }
  .filter-bar label { display: block; font-size: 0.8rem; margin-bottom: 4px; color: var(--text-secondary); }
  .filter-bar input, .filter-bar button {
    width: 100%;
    padding: 8px 12px;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    color: white;
    font-size: 0.9rem;
  }
  .filter-bar button {
    background: var(--neon-blue);
    color: #0a0a0f;
    font-weight: bold;
    cursor: pointer;
    width: auto;
    padding: 8px 20px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-bar button:hover { box-shadow: 0 0 15px var(--neon-blue); }
  .top-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
  .month-selector {
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
    border-radius: 40px; padding: 6px 15px; display: inline-flex; align-items: center; gap: 12px;
  }
  .month-selector label { color: var(--text-secondary); font-size: 0.9rem; }
  .month-selector select { background: transparent; border: none; color: white; font-size: 0.9rem; outline: none; cursor: pointer; }
  .month-selector select option { background: #0a0a0f; }
  .summary-inline {
    background: rgba(0, 243, 255, 0.1); border-radius: 40px; padding: 6px 18px; font-size: 0.85rem;
    color: var(--neon-blue); white-space: nowrap; overflow-x: auto; max-width: 100%;
  }
  .stats-grid { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card {
    background: var(--glass); backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border); border-radius: 14px;
    padding: 12px 24px; flex: 1; min-width: 140px; text-align: center;
    box-shadow: var(--border-glow); transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(0, 243, 255, 0.5); }
  .stat-card .label { font-size: 0.8rem; color: var(--text-secondary); letter-spacing: 1px; margin-bottom: 4px; }
  .stat-card .number { font-size: 2rem; font-weight: bold; color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); line-height: 1.2; }
  .table-fixed-header {
    background: var(--panel-bg); backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border); border-radius: 16px;
    overflow: hidden; box-shadow: var(--border-glow), 0 10px 30px rgba(0,0,0,0.6);
  }
  .thead-container { overflow-x: auto; overflow-y: hidden; scrollbar-width: none; -ms-overflow-style: none; }
  .thead-container::-webkit-scrollbar { display: none; }
  .thead-container table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 1000px; }
  .tbody-container { overflow-x: auto; overflow-y: auto; max-height: 70vh; position: relative; }
  .tbody-container table { width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 1000px; }
  th, td { padding: 12px 8px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  th {
    background: rgba(0, 243, 255, 0.2); font-size: 14px; font-weight: 600;
    color: var(--neon-blue); text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 2px solid var(--neon-blue);
  }
  td { border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; color: var(--text-primary); }
  .tbody-container tr:hover td { background: rgba(0, 243, 255, 0.08); color: #fff; }
  th:nth-child(1), td:nth-child(1) { width: 8%; }
  th:nth-child(2), td:nth-child(2) { width: 12%; }
  th:nth-child(3), td:nth-child(3) { width: 14%; }
  th:nth-child(4), td:nth-child(4) { width: 10%; }
  th:nth-child(5), td:nth-child(5) { width: 9%; }
  th:nth-child(6), td:nth-child(6) { width: 6%; }
  th:nth-child(7), td:nth-child(7) { width: 5%; }
  th:nth-child(8), td:nth-child(8) { width: 5%; }
  th:nth-child(9), td:nth-child(9) { width: 15%; }
  th:nth-child(10), td:nth-child(10) { width: 16%; }
  .error { color: var(--danger); margin-top: 15px; text-shadow: 0 0 8px var(--danger); }

  /* 模态框 */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--panel-bg); border: 1px solid var(--glass-border);
    border-radius: 16px; padding: 30px; max-width: 90vw; width: 800px; max-height: 90vh;
    overflow-y: auto; box-shadow: var(--border-glow), 0 10px 30px rgba(0,0,0,0.6);
    animation: fadeIn 0.3s ease;
  }
  .modal h3 { color: var(--neon-blue); margin-bottom: 20px; font-size: 1.5rem; }
  .modal select, .modal input, .modal textarea, .modal label {
    width: 100%; padding: 10px; margin: 8px 0;
    background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
    border-radius: 6px; color: white; font-family: var(--font-family);
    height: 42px; box-sizing: border-box; font-size: 0.9rem;
  }
  .modal textarea { height: 80px; resize: vertical; }
  .modal button {
    margin: 10px 5px 0 0; padding: 10px 20px; border: none; border-radius: 6px;
    cursor: pointer; font-weight: bold; height: 42px; font-size: 0.9rem;
    transition: all 0.2s;
  }
  .modal button:hover { filter: brightness(1.1); }
  .btn-primary { background: var(--neon-blue); color: #0a0a0f; }
  .btn-primary:hover { box-shadow: 0 0 15px var(--neon-blue); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { box-shadow: 0 0 15px var(--danger); }
  .btn-success { background: var(--success); color: #0a0a0f; }
  .btn-success:hover { box-shadow: 0 0 15px var(--success); }
  .close-btn {
    background: transparent; color: var(--text-secondary); float: right;
    font-size: 1.5rem; cursor: pointer; border: none; padding: 0; line-height: 1;
    transition: color 0.2s;
  }
  .close-btn:hover { color: var(--danger); }
  .form-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 10px; }
  .form-col { flex: 1; min-width: 200px; }
  .mode-switch { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  .mode-btn {
    background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
    padding: 8px 16px; border-radius: 40px; cursor: pointer; color: white; font-size: 0.85rem;
    transition: all 0.2s;
  }
  .mode-btn.active { background: var(--neon-blue); color: #0a0a0f; border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
  .batch-section { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin: 15px 0; }
  .batch-controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 15px; }
  .date-range-panel {
    display: flex; flex-direction: row !important; gap: 12px; align-items: flex-end;
    margin-bottom: 15px; padding-top: 10px; border-top: 1px solid var(--glass-border);
  }
  .date-range-panel .date-input { flex: 1; min-width: 0; }
  .date-range-panel label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: var(--text-secondary); }
  .date-range-panel input { height: 42px; }
  .batch-action-buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-end; margin-top: 15px; }
  .edit-create-footer { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
  .station-list {
    max-height: 300px; overflow-y: auto; border: 1px solid var(--glass-border);
    border-radius: 8px; padding: 8px; background: rgba(0,0,0,0.2);
  }
  .station-item { display: flex; align-items: center; gap: 8px; padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .station-item label { margin: 0; cursor: pointer; flex:1; word-break: break-word; font-size: 0.85rem; }
  .station-item input[type="checkbox"] { width: auto; margin: 0; accent-color: var(--neon-blue); }
  .modal-overlay .modal select,
  .modal-overlay .modal select option { background-color: #1e293b !important; color: #ffffff !important; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* 油品映射编辑器 */
  .fuel-preset-btn {
    background: rgba(0, 243, 255, 0.2); border: 1px solid var(--neon-blue);
    color: var(--neon-blue); padding: 6px 14px; border-radius: 20px;
    font-size: 0.85rem; cursor: pointer; transition: all 0.2s; position: relative;
  }
  .fuel-preset-btn:hover { background: var(--neon-blue); color: #0a0a0f; }
  .fuel-preset-btn.selected { background: rgba(0, 230, 118, 0.3); border-color: var(--success); color: var(--success); }
  .fuel-preset-btn.selected::after {
    content: "✓"; position: absolute; bottom: 0; right: 4px;
    font-size: 0.7rem; color: var(--success); font-weight: bold;
  }
  .fuel-mapping-entry, .cardno-entry { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .fuel-mapping-entry input, .cardno-entry input {
    background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);
    border-radius: 6px; color: white; padding: 6px 10px; height: 36px;
    font-size: 0.85rem; width: auto; flex: 1;
  }
  .fuel-mapping-entry .btn-remove-fuel,
  .cardno-entry .btn-remove-cardno {
    background: none; border: 1px solid var(--danger); color: var(--danger);
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .fuel-mapping-entry .btn-remove-fuel:hover,
  .cardno-entry .btn-remove-cardno:hover { background: var(--danger); color: white; }

  /* 用户管理表格 */
  .user-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
  .user-table th, .user-table td { padding: 10px 12px; text-align: left; font-size: 0.9rem; border-bottom: 1px solid var(--glass-border); }
  .user-table th { background: rgba(0, 243, 255, 0.1); color: var(--neon-blue); }
  .user-table td button { padding: 4px 12px; margin: 2px; font-size: 0.8rem; height: 32px; }

  /* 空状态 */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 1rem; }
  .empty-state::before { content: "📭"; display: block; font-size: 2rem; margin-bottom: 10px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

  /* ========== 移动端优化 ========== */
  @media (max-width: 768px) {
    #app { padding: 12px; }
    .title { font-size: 1.3rem; }
    .logout-btn, .admin-btn, .config-btn { padding: 5px 10px; font-size: 0.7rem; letter-spacing: 1px; }
    .stat-card { padding: 6px 12px; min-width: 100px; }
    .stat-card .number { font-size: 1.4rem; }
    .stat-card .label { font-size: 0.7rem; }
    .month-selector { padding: 4px 10px; }
    .month-selector label, .month-selector select { font-size: 0.75rem; }
    .summary-inline { font-size: 0.7rem; white-space: normal; word-break: break-word; text-align: center; }
    th, td { padding: 8px 4px; font-size: 0.65rem; }
    .modal { padding: 15px; width: 95%; }
    .modal h3 { font-size: 1.2rem; margin-bottom: 12px; }
    .modal select, .modal input, .modal textarea, .modal label { font-size: 0.75rem; padding: 6px; margin: 4px 0; height: 36px; }
    .modal button { padding: 6px 12px; font-size: 0.7rem; margin: 5px 2px 0 0; height: 36px; }
    .mode-btn { padding: 5px 10px; font-size: 0.7rem; }
    .form-row { gap: 8px; margin-bottom: 6px; }
    .form-col { min-width: auto; }
    .batch-controls { gap: 6px; justify-content: center; }
    .batch-controls button { flex: 1; min-width: 70px; font-size: 0.65rem; padding: 5px; height: 34px; }
    .date-range-panel { gap: 6px; }
    .date-range-panel input { padding: 4px; font-size: 0.7rem; height: 34px; }
    .batch-action-buttons, .edit-create-footer { gap: 8px; justify-content: center; }
    .batch-action-buttons button, .edit-create-footer button { flex: 1; height: 34px; }
    .station-item label { font-size: 0.7rem; }

    /* 过滤器：让输入框和按钮尽量同行 */
    .filter-bar {
      flex-direction: row;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 8px;
    }
    .filter-bar .filter-input {
      flex: 2;
      min-width: 120px;
    }
    .filter-bar button {
      width: auto;
      flex: none;
      padding: 8px 12px;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    /* 油品映射 & 卡号条目：保持水平排列 */
    .fuel-mapping-entry, .cardno-entry {
      flex-direction: row;
      flex-wrap: nowrap;
      gap: 4px;
    }
    .fuel-mapping-entry input, .cardno-entry input {
      flex: 1;
      min-width: 0;
      padding: 4px 6px;
      font-size: 0.75rem;
      height: 32px;
    }
    .fuel-mapping-entry .btn-remove-fuel,
    .cardno-entry .btn-remove-cardno {
      width: 28px;
      height: 28px;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    /* 预设油品按钮：缩小并允许换行 */
    .fuel-preset-btn {
      padding: 4px 10px;
      font-size: 0.7rem;
    }
  }
</style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div id="app"></div>
<script>
(function() {
  // 粒子动画 (GPU 加速)
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const PARTICLE_COUNT = 150;
  let centerX, centerY;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    centerX = canvas.width / 2;
    centerY = canvas.height / 2;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  class Particle {
    constructor() { this.reset(true); }
    reset(initial = false) {
      const angle = Math.random() * Math.PI * 2;
      const distance = initial ? Math.random() * 50 : 10;
      this.x = centerX + Math.cos(angle) * distance;
      this.y = centerY + Math.sin(angle) * distance;
      const speed = 0.5 + Math.random() * 1.5;
      this.speedX = Math.cos(angle) * speed;
      this.speedY = Math.sin(angle) * speed;
      this.size = 0.5 + Math.random() * 2;
      this.opacity = 0.4 + Math.random() * 0.6;
      this.color = Math.random() > 0.5 ? 'rgba(0,243,255,' : 'rgba(255,255,255,';
    }
    update() {
      this.x += this.speedX; this.y += this.speedY;
      if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
    }
    draw(ctx) {
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
      ctx.fillStyle = this.color + this.opacity + ')'; ctx.fill();
    }
  }
  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
  function animateParticles() {

      if (!res.ok) throw new Error(await res.text());

  // --- 油品映射编辑器辅助函数 ---
  function parseFuelMappings(text) {
    const mappings = [];
    if (!text) return mappings;
    const parts = text.split(',');
    for (let i = 0; i < parts.length; i += 2) {
      const gcodePart = parts[i]?.trim();
      const gnamePart = parts[i + 1]?.trim();
      if (gcodePart && gnamePart) {
        const gcode = gcodePart.replace('gcode:', '').trim();
        const gname = gnamePart.replace('gname:', '').trim();
        if (gcode && gname) mappings.push({ gcode, gname });
      }
    }
    return mappings;
  }

  function serializeFuelMappings(mappings) {
    return mappings.map(m => `gcode:${m.gcode},gname:${m.gname}`).join(',');
  }

  function syncPresetButtons(editorContainer) {
    const entries = editorContainer.querySelectorAll('.fuel-mapping-entry');
    const existingGcodes = new Set();
    entries.forEach(entry => {
      const gcodeInput = entry.querySelector('.fuel-gcode');
      if (gcodeInput) {
        const val = gcodeInput.value.trim();
        if (val) existingGcodes.add(val);
      }
    });
    const presetBtns = editorContainer.querySelectorAll('.preset-fuel-btn');
    presetBtns.forEach(btn => {
      const gcode = btn.dataset.gcode;
      if (existingGcodes.has(gcode)) {
        btn.classList.add('selected');
      } else {
        btn.classList.remove('selected');
      }
    });
  }

  function initFuelMappingEditor(container, initialText, isEnabled = true) {
    const entriesContainer = container.querySelector('#fuelMappingEntries');
    const presetContainer = container.querySelector('#fuelPresetButtons');
    if (!entriesContainer || !presetContainer) return;

    entriesContainer.innerHTML = '';
    const mappings = parseFuelMappings(initialText);
    if (mappings.length === 0) {
      mappings.push({ gcode: '', gname: '' });
    }
    renderFuelEntries(entriesContainer, mappings, isEnabled, container);

    if (!presetContainer.dataset.bound) {
      presetContainer.querySelectorAll('.preset-fuel-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const gcode = btn.dataset.gcode;
          const gname = btn.dataset.gname;
          togglePresetFuel(entriesContainer, gcode, gname, isEnabled, container);
        });
      });
      presetContainer.dataset.bound = 'true';
    }
    syncPresetButtons(container);
  }

  function togglePresetFuel(entriesContainer, gcode, gname, isEnabled, editorContainer) {
    if (!isEnabled) return;
    const existing = entriesContainer.querySelectorAll('.fuel-mapping-entry');
    let found = null;
    existing.forEach(entry => {
      const gcodeInput = entry.querySelector('.fuel-gcode');
      if (gcodeInput && gcodeInput.value.trim() === gcode) {
        found = entry;
      }
    });
    if (found) {
      found.remove();
    } else {
      addFuelEntry(entriesContainer, gcode, gname, isEnabled, false);
    }
    syncPresetButtons(editorContainer);
  }

  function renderFuelEntries(container, mappings, isEnabled, editorContainer) {
    container.innerHTML = '';
    mappings.forEach((m, idx) => {
      const entryDiv = document.createElement('div');
      entryDiv.className = 'fuel-mapping-entry';
      entryDiv.innerHTML = `
        <input type="text" placeholder="gcode" value="${m.gcode}" class="fuel-gcode" ${isEnabled ? '' : 'readonly'}>
        <input type="text" placeholder="gname" value="${m.gname}" class="fuel-gname" ${isEnabled ? '' : 'readonly'}>
        <button type="button" class="btn-remove-fuel" ${isEnabled ? '' : 'disabled'}>✕</button>
      `;
      container.appendChild(entryDiv);
    });
    if (isEnabled) {
      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'mode-btn';
      addBtn.textContent = '+ 自定义油品';
      addBtn.style.marginTop = '8px';
      addBtn.addEventListener('click', () => {
        addFuelEntry(container, '', '', true, true);
        if (editorContainer) syncPresetButtons(editorContainer);
      });
      container.appendChild(addBtn);
    }
    container.querySelectorAll('.btn-remove-fuel').forEach(btn => {
      btn.addEventListener('click', function(e) {
        if (!isEnabled) return;
        const entry = e.target.closest('.fuel-mapping-entry');
        if (entry) {
          entry.remove();
          if (editorContainer) syncPresetButtons(editorContainer);
        }
      });
    });
  }

  function addFuelEntry(container, gcode, gname, isEnabled, shouldSync = true) {
    const entryDiv = document.createElement('div');
    entryDiv.className = 'fuel-mapping-entry';
    entryDiv.innerHTML = `
      <input type="text" placeholder="gcode" value="${gcode}" class="fuel-gcode">
      <input type="text" placeholder="gname" value="${gname}" class="fuel-gname">
      <button type="button" class="btn-remove-fuel" ${isEnabled ? '' : 'disabled'}>✕</button>
    `;
    const addBtn = container.querySelector('button.mode-btn');
    container.insertBefore(entryDiv, addBtn);
    entryDiv.querySelector('.btn-remove-fuel').addEventListener('click', function() {
      entryDiv.remove();
      if (shouldSync && container.closest('#fuelMappingEditor')) {
        syncPresetButtons(container.closest('#fuelMappingEditor'));
      }
    });
    if (shouldSync && container.closest('#fuelMappingEditor')) {
      syncPresetButtons(container.closest('#fuelMappingEditor'));
    }
  }

  function getFuelMappingsFromEditor(container) {
    const entries = container.querySelectorAll('.fuel-mapping-entry');
    const mappings = [];
    entries.forEach(entry => {
      const gcode = entry.querySelector('.fuel-gcode').value.trim();
      const gname = entry.querySelector('.fuel-gname').value.trim();
      if (gcode && gname) {
        mappings.push({ gcode, gname });
      }
    });
    return mappings;
  }

  // --- 卡号数组编辑器辅助函数 ---
  function parseCardnoArray(text) {
    if (!text) return [];
    return text.split(',').map(s => s.trim()).filter(Boolean);
  }

  function serializeCardnoArray(arr) {
    return arr.filter(Boolean).join(',');
  }

  function initCardnoEditor(container, initialText, isEnabled = true) {
    const entriesContainer = container.querySelector('#cardnoEntries');
    if (!entriesContainer) return;
    entriesContainer.innerHTML = '';
    const cards = parseCardnoArray(initialText);
    if (cards.length === 0) {
      for (let i = 0; i < 4; i++) cards.push('');
    }
    renderCardnoEntries(entriesContainer, cards, isEnabled);
    const addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.className = 'mode-btn';
    addBtn.textContent = '+ 添加卡号';
    addBtn.style.marginTop = '8px';
    addBtn.addEventListener('click', () => {
      addCardnoEntry(entriesContainer, '', isEnabled);
    });
    entriesContainer.appendChild(addBtn);
  }

  function renderCardnoEntries(container, cards, isEnabled) {
    container.querySelectorAll('.cardno-entry').forEach(el => el.remove());
    cards.forEach((card, idx) => {
      const entryDiv = document.createElement('div');
      entryDiv.className = 'cardno-entry';
      entryDiv.innerHTML = `
        <input type="text" placeholder="卡号" value="${card}" class="cardno-input" ${isEnabled ? '' : 'readonly'}>
        <button type="button" class="btn-remove-cardno" ${isEnabled ? '' : 'disabled'}>✕</button>
      `;
      container.insertBefore(entryDiv, container.querySelector('button.mode-btn'));
      entryDiv.querySelector('.btn-remove-cardno').addEventListener('click', function() {
        if (!isEnabled) return;
        const entry = this.closest('.cardno-entry');
        if (entry) entry.remove();
      });
    });
  }

  function addCardnoEntry(container, value, isEnabled) {
    const entryDiv = document.createElement('div');
    entryDiv.className = 'cardno-entry';
    entryDiv.innerHTML = `
      <input type="text" placeholder="卡号" value="${value}" class="cardno-input">
      <button type="button" class="btn-remove-cardno" ${isEnabled ? '' : 'disabled'}>✕</button>
    `;
    const addBtn = container.querySelector('button.mode-btn');
    container.insertBefore(entryDiv, addBtn);
    entryDiv.querySelector('.btn-remove-cardno').addEventListener('click', function() {
      entryDiv.remove();
    });
  }

  function getCardnoArrayFromEditor(container) {
    const inputs = container.querySelectorAll('.cardno-input');
    return Array.from(inputs).map(inp => inp.value.trim()).filter(Boolean);
  }

    tabBatch.onclick = () => setActiveTab('batch');

    const getField = id => document.getElementById(id);
    const setField = (id, val) => { const f = getField(id); if (f) f.value = val !== undefined ? val : ''; };
    const getFieldVal = id => getField(id).value;

    const newFields = ['transactionorgcode','usedcount','count','startdate','enddate','lastresetdate','user_id'];
    const getNewFieldVal = (key) => document.getElementById('new' + key.charAt(0).toUpperCase() + key.slice(1)).value;
    const setNewField = (key, val) => { const el = document.getElementById('new' + key.charAt(0).toUpperCase() + key.slice(1)); if (el) el.value = val; };
    const DEFAULT_FUEL_MAPPINGS = "gcode:60518727,gname:95号车用汽油(ⅥB),gcode:60518726,gname:92号车用汽油(ⅥB),gcode:60514943,gname:0号车用柴油(VI)";

    function clearEditFields() { newFields.forEach(f => setField(f, '')); }
    function setDefaultCreateFields() {
      setNewField('transactionorgcode', DEFAULT_TRANSACTION_ORG_CODE);
      setNewField('usedcount', '');
      setNewField('count', '');
      setNewField('startdate', DEFAULT_STARTDATE);
      setNewField('enddate', DEFAULT_ENDDATE);
      setNewField('lastresetdate', '');
      setNewField('user_id', '');
      initFuelMappingEditor(fuelEditor, DEFAULT_FUEL_MAPPINGS, true);
      initCardnoEditor(newCardnoEditor, DEFAULT_CARDNO_ARRAY, true);
    }
    tabCreate.addEventListener('click', setDefaultCreateFields);

    async function loadStationForEdit(stationId) {
      if (!stationId) { clearEditFields(); return; }
      try {
        const { data, error } = await supabase.from('stations').select('*').eq('id', stationId).single();
        if (error) throw error;
        if (data) {
          setField('transactionorgcode', data.transactionorgcode || '');
          setField('usedcount', data.usedcount ?? '');
          setField('count', data.count ?? '');
          setField('startdate', data.startdate ? data.startdate.slice(0,10) : '');
          setField('enddate', data.enddate ? data.enddate.slice(0,10) : '');
          setField('lastresetdate', data.lastresetdate ? data.lastresetdate.slice(0,10) : '');
          setField('user_id', data.user_id || '');
          initFuelMappingEditor(editFuelEditor, data.fuelmappings || '', true);
          initCardnoEditor(editCardnoEditor, data.cardnoarray || '', true);
        }
      } catch (err) { document.getElementById('configMsg').textContent = '加载失败: ' + err.message; }
    }
    const stationSelect = document.getElementById('stationSelect');
    stationSelect.addEventListener('change', (e) => { currentEditStationId = e.target.value; if (currentEditStationId) loadStationForEdit(currentEditStationId); else clearEditFields(); });

    document.getElementById('saveEditBtn').onclick = async () => {
      const msg = document.getElementById('configMsg'); msg.textContent = '';
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { msg.textContent = '未登录'; return; }
      if (!currentEditStationId) { msg.textContent = '请选择一个站点'; return; }
      const config = {};
      newFields.forEach(f => { const val = getFieldVal(f); if (val !== '') config[f] = (f === 'usedcount' || f === 'count') ? parseInt(val) : val; });
      const fuelMappings = getFuelMappingsFromEditor(editFuelEditor);
      config.fuelmappings = serializeFuelMappings(fuelMappings);
      const cardnoArr = getCardnoArrayFromEditor(editCardnoEditor);
      config.cardnoarray = serializeCardnoArray(cardnoArr);
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/update-station-config`, {
          method: 'POST', headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ stationId: currentEditStationId, config })
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        alert('更新成功'); closeModal();
      } catch (err) { msg.textContent = '保存失败: ' + err.message; }
    };
    document.getElementById('saveCreateBtn').onclick = async () => {
      const msg = document.getElementById('configMsg'); msg.textContent = '';
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { msg.textContent = '未登录'; return; }
      const stncode = document.getElementById('newStncode').value.trim();
      const shortname = document.getElementById('newShortname').value.trim();
      if (!stncode || !shortname) { msg.textContent = '站点编码和简称为必填'; return; }
      const newStation = { stncode, shortname };
      const standardFields = ['transactionorgcode','usedcount','count','startdate','enddate','lastresetdate','user_id'];
      standardFields.forEach(f => {
        const val = getNewFieldVal(f);
        if (val !== '') newStation[f] = (f === 'usedcount' || f === 'count') ? parseInt(val) : val;
      });
      const fuelMappings = getFuelMappingsFromEditor(fuelEditor);
      newStation.fuelmappings = serializeFuelMappings(fuelMappings);
      const cardnoArr = getCardnoArrayFromEditor(newCardnoEditor);
      newStation.cardnoarray = serializeCardnoArray(cardnoArr);
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/create-station`, {
          method: 'POST', headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(newStation)
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        alert('新增成功'); closeModal();
      } catch (err) { msg.textContent = '新增失败: ' + err.message; }
    };

    // ========== 批量启用/禁用逻辑 ==========
    async function updateStationsDates(stationIds, startdate, enddate) {
      if (!stationIds.length) { alert('没有选中任何站点'); return false; }
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { alert('未登录'); return false; }
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/update-stations-dates`, {
          method: 'POST', headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ stationIds, startdate, enddate })
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        alert(`成功更新 ${result.updatedCount} 个站点`);
        return true;
      } catch (err) { alert('批量更新失败: ' + err.message); return false; }
    }
    function getSelectedIds() {
      return Array.from(document.querySelectorAll('#stationChecklist input[type="checkbox"]:checked')).map(cb => cb.value);
    }
    async function refreshStationList() {
      const { data, error } = await supabase.from('stations').select('id, stncode, shortname, startdate, enddate');
      if (!error && data) {
        stationsList = data;
        const container = document.getElementById('stationChecklist');
        const today = new Date().toISOString().slice(0,10);
        container.innerHTML = stationsList.map(s => {
          const start = s.startdate ? s.startdate.slice(0,10) : '';
          const end = s.enddate ? s.enddate.slice(0,10) : '';
          const isEnabled = (start <= today && today <= end);
          return `<div class="station-item"><input type="checkbox" value="${s.id}" id="chk_${s.id}"><label for="chk_${s.id}">${s.stncode} - ${s.shortname} (区间: ${start||'无'} ~ ${end||'无'}) ${isEnabled ? '✅启用中' : '❌已禁用'}</label></div>`;
        }).join('');
      }
    }
    const todayStr = new Date().toISOString().slice(0,10);
    const farFuture = '2099-12-31';
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yesterdayStr = yesterday.toISOString().slice(0,10);
    document.getElementById('enableAllBtn').onclick = async () => { if (await updateStationsDates(stationsList.map(s=>s.id), todayStr, farFuture)) await refreshStationList(); };
    document.getElementById('disableAllBtn').onclick = async () => { if (await updateStationsDates(stationsList.map(s=>s.id), null, yesterdayStr)) await refreshStationList(); };
    document.getElementById('enableSelectedBtn').onclick = async () => { const ids = getSelectedIds(); if (!ids.length) alert('请先勾选'); else if (await updateStationsDates(ids, todayStr, farFuture)) await refreshStationList(); };
    document.getElementById('disableSelectedBtn').onclick = async () => { const ids = getSelectedIds(); if (!ids.length) alert('请先勾选'); else if (await updateStationsDates(ids, null, yesterdayStr)) await refreshStationList(); };
    document.getElementById('applyDateToSelected').onclick = async () => {
      const start = document.getElementById('customStartDate').value, end = document.getElementById('customEndDate').value;
      if (!start || !end) { alert('请填写完整日期'); return; }
      const ids = getSelectedIds(); if (!ids.length) { alert('请先勾选站点'); return; }
      if (await updateStationsDates(ids, start, end)) await refreshStationList();
    };
    document.getElementById('applyDateToAll').onclick = async () => {
      const start = document.getElementById('customStartDate').value, end = document.getElementById('customEndDate').value;
      if (!start || !end) { alert('请填写完整日期'); return; }
      if (await updateStationsDates(stationsList.map(s=>s.id), start, end)) await refreshStationList();
    };
  }

    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('togglePwd').addEventListener('click', togglePasswordVisibility);
    document.getElementById('adminBtn').addEventListener('click', showAdminPanel);
    document.getElementById('batchCreateBtn').addEventListener('click', batchCreateAccounts);
    document.getElementById('configBtn').addEventListener('click', showStationConfig);

    // 防抖处理过滤器输入
    let filterTimeout;
    document.getElementById('stncodeFilter').addEventListener('input', function(e) {
      clearTimeout(filterTimeout);
      filterTimeout = setTimeout(() => {
        currentFilterStncode = e.target.value.trim();
        allLogsCache = null;
        updateSummaryAndTable(document.getElementById('monthSelect').value);
      }, 300);
    });

    document.getElementById('applyFilterBtn').onclick = async () => {
      currentFilterStncode = document.getElementById('stncodeFilter').value.trim();
      allLogsCache = null;
      await updateSummaryAndTable(document.getElementById('monthSelect').value);
    };
    document.getElementById('resetFilterBtn').onclick = async () => {
      document.getElementById('stncodeFilter').value = '';
      currentFilterStncode = '';
      allLogsCache = null;
      await updateSummaryAndTable(document.getElementById('monthSelect').value);
    };
  }

  buildUI();
  bindEvents();

  (async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) await showData(); else showLogin();
  })();
})();
</script>
</body>
