<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>数据中心</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ========== 科幻视觉风格（完整保留） ========== */
  :root {
    --neon-blue: #00f3ff;
    --neon-purple: #b300ff;
    --dark-bg: #0a0a0f;
    --panel-bg: rgba(10, 15, 25, 0.85);
    --border-glow: 0 0 10px rgba(0, 243, 255, 0.3);
    --text-primary: #e0f7fa;
    --text-secondary: #80deea;
    --accent: #00e5ff;
    --danger: #ff1744;
    --success: #00e676;
    --glass: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.12);
    --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', '微软雅黑', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
    background-attachment: fixed;
    color: var(--text-primary);
    font-family: var(--font-family);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  #particleCanvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
  }
  body::after {
    content: "";
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 243, 255, 0.02) 2px, rgba(0, 243, 255, 0.02) 4px);
    pointer-events: none; z-index: 0;
  }
  #app {
    position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 20px;
  }
  #loginSection {
    display: flex; justify-content: center; align-items: center; min-height: 100vh;
  }
  .login-box {
    background: var(--panel-bg);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 40px 30px; width: 400px;
    box-shadow: var(--border-glow), 0 20px 40px rgba(0,0,0,0.5);
    text-align: center; animation: fadeInUp 0.6s ease;
  }
  .login-box h3 {
    font-size: 1.8rem; letter-spacing: 4px;
    color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue), 0 0 30px var(--neon-blue);
    margin-bottom: 30px; font-weight: 600;
  }
  .login-box input[type="email"],
  .login-box input[type="password"],
  .login-box input[type="text"] {
    width: 100%; padding: 14px 16px; margin: 12px 0;
    background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border);
    border-radius: 8px; color: white; font-size: 16px;
    outline: none; transition: all 0.3s; font-family: var(--font-family);
  }
  .login-box input:focus {
    border-color: var(--neon-blue);
    box-shadow: 0 0 12px rgba(0, 243, 255, 0.5);
    background: rgba(255,255,255,0.12);
  }
  .login-box input::placeholder { color: rgba(255,255,255,0.4); }
  .password-wrapper { position: relative; margin: 12px 0; }
  .password-wrapper input { padding-right: 45px !important; margin: 0; }
  .password-toggle {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-secondary); font-size: 1.3rem;
    cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
    transition: color 0.2s; padding: 0;
  }
  .password-toggle:hover { color: var(--neon-blue); }
  .login-box button[type="button"] {
    width: 100%; padding: 14px; margin-top: 20px;
    background: transparent; border: 2px solid var(--neon-blue);
    color: var(--neon-blue); font-size: 18px; font-weight: bold;
    letter-spacing: 3px; border-radius: 8px; cursor: pointer;
    transition: all 0.3s; text-transform: uppercase; position: relative; overflow: hidden;
  }
  .login-box button[type="button"]:hover {
    background: var(--neon-blue); color: #0a0a0f;
    box-shadow: 0 0 20px var(--neon-blue), 0 0 40px var(--neon-blue);
  }
  .login-box button[type="button"]::before {
    content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: rotate(45deg); animation: btnShine 3s infinite;
  }
  @keyframes btnShine { 0% { left: -50%; } 100% { left: 150%; } }
  .remember-row {
    display: flex; align-items: center; margin-top: 15px; color: var(--text-secondary);
    font-size: 0.9rem; gap: 8px;
  }
  .remember-row input[type="checkbox"] { accent-color: var(--neon-blue); }
  #loginError { color: var(--danger); margin-top: 15px; font-size: 14px; text-shadow: 0 0 8px var(--danger); }
  #dataSection { animation: fadeIn 0.5s ease; }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .title {
    font-size: 1.8rem;
    color: var(--neon-blue);
    text-shadow: 0 0 15px var(--neon-blue);
    letter-spacing: 2px;
    font-weight: 600;
  }
  .user-email-in-title {
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-left: 12px;
    font-weight: normal;
    letter-spacing: normal;
    text-shadow: none;
  }
  .logout-btn, .admin-btn, .config-btn {
    background: transparent;
    padding: 8px 18px;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .logout-btn { border: 2px solid var(--danger); color: var(--danger); }
  .logout-btn:hover { background: var(--danger); color: #fff; box-shadow: 0 0 20px var(--danger); }
  .admin-btn { border-color: var(--neon-blue); color: var(--neon-blue); margin-right: 10px; }
  .admin-btn:hover { background: var(--neon-blue); color: #0a0a0f; box-shadow: 0 0 20px var(--neon-blue); }
  .config-btn { border-color: var(--success); color: var(--success); margin-right: 10px; }
  .config-btn:hover { background: var(--success); color: #0a0a0f; box-shadow: 0 0 20px var(--success); }
  .filter-bar {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-bar .filter-input { flex: 2; min-width: 150px; }
  .filter-bar label { display: block; font-size: 0.8rem; margin-bottom: 4px; color: var(--text-secondary); }
  .filter-bar input, .filter-bar button {
    width: 100%;
    padding: 8px 12px;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    color: white;
    font-size: 0.9rem;
  }
  .filter-bar button {
    background: var(--neon-blue);
    color: #0a0a0f;
    font-weight: bold;
    cursor: pointer;
    width: auto;
    padding: 8px 20px;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 20px;
  }
  .month-selector {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--glass-border);
    border-radius: 40px;
    padding: 6px 15px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .month-selector label {
    color: var(--text-secondary);
    font-size: 0.9rem;
  }
  .month-selector select {
    background: transparent;
    border: none;
    color: white;
    font-size: 0.9rem;
    outline: none;
    cursor: pointer;
  }
  .month-selector select option {
    background: #0a0a0f;
  }
  .summary-inline {
    background: rgba(0, 243, 255, 0.1);
    border-radius: 40px;
    padding: 6px 18px;
    font-size: 0.85rem;
    color: var(--neon-blue);
    white-space: nowrap;
    overflow-x: auto;
    max-width: 100%;
  }
  .stats-grid {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .stat-card {
    background: var(--glass);
    backdrop-filter: blur(15px);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    padding: 12px 24px;
    flex: 1;
    min-width: 140px;
    text-align: center;
    box-shadow: var(--border-glow);
  }
  .stat-card .label {
    font-size: 0.8rem;
    color: var(--text-secondary);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .stat-card .number {
    font-size: 2rem;
    font-weight: bold;
    color: var(--neon-blue);
    text-shadow: 0 0 8px var(--neon-blue);
    line-height: 1.2;
  }
  .table-fixed-header {
    background: var(--panel-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--border-glow), 0 10px 30px rgba(0,0,0,0.6);
  }
  .thead-container {
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .thead-container::-webkit-scrollbar { display: none; }
  .thead-container table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    min-width: 1000px;
  }
  .tbody-container {
    overflow-x: auto;
    overflow-y: auto;
    max-height: 70vh;
    position: relative;
  }
  .tbody-container table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    min-width: 1000px;
  }
  th, td {
    padding: 12px 8px;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  th {
    background: rgba(0, 243, 255, 0.2);
    font-size: 14px;
    font-weight: 600;
    color: var(--neon-blue);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 2px solid var(--neon-blue);
  }
  td {
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
    color: var(--text-primary);
  }
  .tbody-container tr:hover td {
    background: rgba(0, 243, 255, 0.08);
    color: #fff;
  }
  th:nth-child(1), td:nth-child(1) { width: 8%; }
  th:nth-child(2), td:nth-child(2) { width: 12%; }
  th:nth-child(3), td:nth-child(3) { width: 14%; }
  th:nth-child(4), td:nth-child(4) { width: 10%; }
  th:nth-child(5), td:nth-child(5) { width: 9%; }
  th:nth-child(6), td:nth-child(6) { width: 6%; }
  th:nth-child(7), td:nth-child(7) { width: 5%; }
  th:nth-child(8), td:nth-child(8) { width: 5%; }
  th:nth-child(9), td:nth-child(9) { width: 15%; }
  th:nth-child(10), td:nth-child(10) { width: 16%; }
  .error { color: var(--danger); margin-top: 15px; text-shadow: 0 0 8px var(--danger); }

  /* 模态框 */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--panel-bg); border: 1px solid var(--glass-border);
    border-radius: 16px; padding: 30px; max-width: 90vw; width: 800px; max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--border-glow), 0 10px 30px rgba(0,0,0,0.6); animation: fadeIn 0.3s ease;
  }
  .modal h3 { color: var(--neon-blue); margin-bottom: 20px; }
  .modal select, .modal input, .modal textarea, .modal label {
    width: 100%; padding: 10px; margin: 8px 0;
    background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 6px; color: white;
    font-family: monospace;
    height: 42px;
    box-sizing: border-box;
  }
  .modal textarea { height: 80px; }
  .modal button {
    margin: 10px 5px 0 0; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
    height: 42px;
  }
  .btn-primary { background: var(--neon-blue); color: #0a0a0f; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-success { background: var(--success); color: #0a0a0f; }
  .close-btn { background: transparent; color: var(--text-secondary); float: right; font-size: 1.5rem; cursor: pointer; }
  .form-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 10px; }
  .form-col { flex: 1; min-width: 200px; }
  .mode-switch { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  .mode-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); padding: 8px 16px; border-radius: 40px; cursor: pointer; color: white; }
  .mode-btn.active { background: var(--neon-blue); color: #0a0a0f; border-color: var(--neon-blue); }
  .batch-section { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin: 15px 0; }
  .batch-controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 15px; }
  .date-range-panel {
    display: flex;
    flex-direction: row !important;
    gap: 12px;
    align-items: flex-end;
    margin-bottom: 15px;
    padding-top: 10px;
    border-top: 1px solid var(--glass-border);
    flex-wrap: nowrap;
  }
  .date-range-panel .date-input { flex: 1; min-width: 0; }
  .date-range-panel label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: var(--text-secondary); }
  .date-range-panel input { height: 42px; }
  .batch-action-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
    margin-top: 15px;
  }
  .edit-create-footer {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 20px;
  }
  .station-list { max-height: 300px; overflow-y: auto; border: 1px solid var(--glass-border); border-radius: 8px; padding: 8px; }
  .station-item { display: flex; align-items: center; gap: 8px; padding: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .station-item label { margin: 0; cursor: pointer; flex:1; word-break: break-word; }
  .station-item input[type="checkbox"] { width: auto; margin: 0; }
  .modal-overlay .modal select,
  .modal-overlay .modal select option {
    background-color: #1e293b !important;
    color: #ffffff !important;
  }
  .panel { display: none; }
  .panel.active { display: block; }

  /* 用户管理表格样式 */
  .user-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
  .user-table th, .user-table td { padding: 10px 12px; text-align: left; font-size: 0.9rem; border-bottom: 1px solid var(--glass-border); }
  .user-table th { background: rgba(0, 243, 255, 0.1); color: var(--neon-blue); }
  .user-table td button { padding: 4px 12px; margin: 2px; font-size: 0.8rem; height: 32px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 768px) {
    #app { padding: 12px; }
    .title { font-size: 1.3rem; }
    .logout-btn, .admin-btn, .config-btn { padding: 5px 10px; font-size: 0.7rem; letter-spacing: 1px; }
    .stat-card { padding: 6px 12px; min-width: 100px; }
    .stat-card .number { font-size: 1.4rem; }
    .stat-card .label { font-size: 0.7rem; }
    .month-selector { padding: 4px 10px; }
    .month-selector label, .month-selector select { font-size: 0.75rem; }
    .summary-inline { font-size: 0.7rem; white-space: normal; word-break: break-word; text-align: center; }
    th, td { padding: 8px 4px; font-size: 0.65rem; }
    .modal { padding: 15px; width: 95%; }
    .modal h3 { font-size: 1.2rem; margin-bottom: 12px; }
    .modal select, .modal input, .modal textarea, .modal label { font-size: 0.75rem; padding: 6px; margin: 4px 0; height: 36px; }
    .modal button { padding: 6px 12px; font-size: 0.7rem; margin: 5px 2px 0 0; height: 36px; }
    .mode-btn { padding: 5px 10px; font-size: 0.7rem; }
    .form-row { gap: 8px; margin-bottom: 6px; }
    .form-col { min-width: auto; }
    .batch-controls { gap: 6px; justify-content: center; }
    .batch-controls button { flex: 1; min-width: 70px; font-size: 0.65rem; padding: 5px; height: 34px; }
    .date-range-panel { gap: 6px; }
    .date-range-panel input { padding: 4px; font-size: 0.7rem; height: 34px; }
    .batch-action-buttons, .edit-create-footer { gap: 8px; justify-content: center; }
    .batch-action-buttons button, .edit-create-footer button { flex: 1; height: 34px; }
    .station-item label { font-size: 0.7rem; }
    .filter-bar { flex-direction: column; align-items: stretch; }
    .filter-bar button { width: 100%; }
  }
</style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div id="app"></div>
<script>
(function() {
  // 粒子动画
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const PARTICLE_COUNT = 150;
  let centerX, centerY;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    centerX = canvas.width / 2;
    centerY = canvas.height / 2;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  class Particle {
    constructor() { this.reset(true); }
    reset(initial = false) {
      const angle = Math.random() * Math.PI * 2;
      const distance = initial ? Math.random() * 50 : 10;
      this.x = centerX + Math.cos(angle) * distance;
      this.y = centerY + Math.sin(angle) * distance;
      const speed = 0.5 + Math.random() * 1.5;
      this.speedX = Math.cos(angle) * speed;
      this.speedY = Math.sin(angle) * speed;
      this.size = 0.5 + Math.random() * 2;
      this.opacity = 0.4 + Math.random() * 0.6;
      this.color = Math.random() > 0.5 ? 'rgba(0,243,255,' : 'rgba(255,255,255,';
    }
    update() {
      this.x += this.speedX; this.y += this.speedY;
      if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
    }
    draw(ctx) {
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
      ctx.fillStyle = this.color + this.opacity + ')'; ctx.fill();
    }
  }
  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 100);
    gradient.addColorStop(0, 'rgba(0, 243, 255, 0.05)'); gradient.addColorStop(1, 'rgba(0, 243, 255, 0)');
    ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(ctx); });
    requestAnimationFrame(animateParticles);
  }
  animateParticles();

  // ========== 业务配置 ==========
  const SUPABASE_URL = "https://gbedtcwsnwteneiokizp.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_6kqvIXFMeqXW-xmwh7GcHQ_LvfH2zon";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const SUPER_ADMIN_EMAIL = "liuping@vip.com";

  // 自动刷新间隔（毫秒），可根据需要修改，建议不低于 5000
  const AUTO_REFRESH_INTERVAL = 10000; // 10秒

  const T = {
    loginTitle: '数据中心', emailPlaceholder: '邮箱', passwordPlaceholder: '密码',
    loginBtn: '进入系统', logoutBtn: '退出登录', summaryLoading: '加载中...',
    summaryPrefix: '站点评论次数', noData: '暂无数据', loadErrorPrefix: '系统异常：',
    tableHeaders: ['站点编码','站点简称','销售单号','油品名称','手机号','姓名','CTC','TTC','评价内容','提交时间'],
    siteSummaryFail: '统计数据加载失败', siteSummaryNone: '无',
    title: '数据中心欢迎您', monthLabel: '选择月份：', rememberMe: '记住密码',
    adminBtn: '用户管理', batchBtn: '批量生成账号', configBtn: '站点数据配置',
    totalLabel: '累计评论总数', todayLabel: '今日评论数', filterPlaceholder: '输入站点编码过滤 (例如 33500071)'
  };

  let allLogsCache = null;
  let currentFilterStncode = '';
  let monthSelectListener = null;
  let autoRefreshTimer = null;

  // ========== UI 构建 ==========
  function buildUI() {
    const app = document.getElementById('app');
    const loginSec = document.createElement('div');
    loginSec.id = 'loginSection';
    loginSec.innerHTML = `
      <div class="login-box">
        <h3>${T.loginTitle}</h3>
        <input type="email" id="email" placeholder="${T.emailPlaceholder}" required>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="${T.passwordPlaceholder}" required>
          <button class="password-toggle" id="togglePwd" type="button" title="显示密码">👁️</button>
        </div>
        <div class="remember-row">
          <input type="checkbox" id="rememberMe"><label for="rememberMe">${T.rememberMe}</label>
        </div>
        <button type="button" id="loginBtn">${T.loginBtn}</button>
        <p id="loginError" class="error"></p>
      </div>
    `;
    app.appendChild(loginSec);

    const dataSec = document.createElement('div');
    dataSec.id = 'dataSection';
    dataSec.style.display = 'none';
    dataSec.innerHTML = `

  function showLogin() {
    document.getElementById('loginSection').style.display = 'flex';
    document.getElementById('dataSection').style.display = 'none';
    stopAutoRefresh();
    const saved = localStorage.getItem('supabase_saved_cred');
    if (saved) {
      try {
        const cred = JSON.parse(saved);
        document.getElementById('email').value = cred.email || '';
        document.getElementById('password').value = cred.password || '';
        document.getElementById('rememberMe').checked = true;
      } catch(e) {}
    }
  }

  async function getCurrentUserRole() {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return null;
    if (user.email === SUPER_ADMIN_EMAIL) return 'super_admin';
    if (user.user_metadata && user.user_metadata.role === 'admin') return 'admin';
    return 'user';
  }

  async function showData() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dataSection').style.display = 'block';
    allLogsCache = null;
    currentFilterStncode = '';
    document.getElementById('stncodeFilter').value = '';
    await loadAvailableMonths();
    await loadCurrentMonthData();
    await updateUIByRole();
    await updateTitleWithUser();
    startAutoRefresh();
  }

  function startAutoRefresh() {
    stopAutoRefresh();
    autoRefreshTimer = setInterval(silentRefresh, AUTO_REFRESH_INTERVAL);
  }

  function stopAutoRefresh() {
    if (autoRefreshTimer) {
      clearInterval(autoRefreshTimer);
      autoRefreshTimer = null;
    }
  }

  // 静默刷新：后台拉取数据，仅在有变化时更新界面
  async function silentRefresh() {
    try {
      const { data, error } = await supabase.from('request_logs').select('created_at, request_body').order('created_at', { ascending: false });
      if (error || !data) return;

      const newLogs = data;
      // 与缓存比较，若条数不同或最新一条时间不同，则认为有更新
      if (!allLogsCache || newLogs.length !== allLogsCache.length) {
        allLogsCache = newLogs;
        const select = document.getElementById('monthSelect');
        if (select.value) {
          await updateSummaryAndTable(select.value);
        }
      } else {
        // 进一步检查最新一条时间是否变化
        const oldLatest = allLogsCache[0]?.created_at || '';
        const newLatest = newLogs[0]?.created_at || '';
        if (oldLatest !== newLatest) {
          allLogsCache = newLogs;
          const select = document.getElementById('monthSelect');
          if (select.value) {
            await updateSummaryAndTable(select.value);
          }
        }
      }
    } catch (err) {
      console.warn('刷新失败:', err.message);
    }
  }

  async function updateTitleWithUser() {
    const { data: { user } } = await supabase.auth.getUser();
    const titleEl = document.getElementById('pageTitle');
    if (titleEl && user) titleEl.innerHTML = `${T.title} <span class="user-email-in-title">(${user.email})</span>`;
  }

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { errEl.textContent = T.loadErrorPrefix + error.message; return; }
    if (document.getElementById('rememberMe').checked) localStorage.setItem('supabase_saved_cred', JSON.stringify({ email, password }));
    else localStorage.removeItem('supabase_saved_cred');
    showData();
  }

  async function logout() { await supabase.auth.signOut(); showLogin(); allLogsCache = null; }

  async function fetchAllLogs() {
    if (allLogsCache) return allLogsCache;
    const { data, error } = await supabase.from('request_logs').select('created_at, request_body').order('created_at', { ascending: false });
    if (error) { console.error(error); return []; }
    allLogsCache = data || [];
    return allLogsCache;
  }

  function isToday(createdAt) {
    const today = new Date(); today.setHours(0,0,0,0);
    const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
    const date = new Date(createdAt);
    return date >= today && date < tomorrow;
  }

  function applyFilter(stncode) {
    if (!allLogsCache) return [];
    if (!stncode) return allLogsCache;
    return allLogsCache.filter(log => {
      const body = log.request_body;
      return body && body.stncode && body.stncode.toString() === stncode.toString();
    });
  }

  async function updateGlobalStats() {
    if (!allLogsCache) return;
    const logs = currentFilterStncode ? applyFilter(currentFilterStncode) : allLogsCache;
    document.getElementById('totalCount').innerText = logs.length;
    const todayCount = logs.filter(log => isToday(log.created_at)).length;
    document.getElementById('todayCount').innerText = todayCount;
  }

  async function loadAvailableMonths() {
    const logs = await fetchAllLogs();
    const months = new Set();
    logs.forEach(l => { if (l.created_at) months.add(l.created_at.substring(0,7)); });
    const sorted = Array.from(months).sort().reverse();
    const select = document.getElementById('monthSelect');
    if (monthSelectListener) select.removeEventListener('change', monthSelectListener);
    select.innerHTML = sorted.map(m => `<option value="${m}">${m}</option>`).join('');
    if (sorted.length > 0) { select.value = sorted[0]; await updateSummaryAndTable(sorted[0]); }
    else document.getElementById('summaryInline').textContent = T.siteSummaryNone;
    monthSelectListener = function() { updateSummaryAndTable(this.value); };
    select.addEventListener('change', monthSelectListener);
  }

  async function updateSummaryAndTable(month) {
    await fetchAllLogs();
    const logs = currentFilterStncode ? applyFilter(currentFilterStncode) : allLogsCache;
    renderSummary(month, logs);
    renderTable(month, logs);
    await updateGlobalStats();
  }

  function renderSummary(month, logs) {
    const counts = {};
    logs.forEach(l => {
      if (!l.created_at || l.created_at.substring(0,7) !== month) return;
      const code = l.request_body?.stncode; if (code) counts[code] = (counts[code]||0)+1;
    });
    const items = Object.entries(counts).map(([c, n]) => `${c}: ${n}次`).join(' | ');
    const summaryEl = document.getElementById('summaryInline');
    if (items) summaryEl.innerHTML = `${T.summaryPrefix} (${month})：${items}`;
    else summaryEl.innerHTML = `${T.summaryPrefix} (${month})：${T.siteSummaryNone}`;
  }

  function renderTable(month, logs) {
    const filtered = logs.filter(l => l.created_at && l.created_at.substring(0,7) === month);
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    if (filtered.length === 0) {
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.colSpan = T.tableHeaders.length;
      td.textContent = T.noData;
      td.style.textAlign = 'center';
      tr.appendChild(td);
      tbody.appendChild(tr);
      return;
    }
    // 使用 DocumentFragment 批量插入，减少重排
    const fragment = document.createDocumentFragment();
    filtered.forEach(row => {
      const body = row.request_body;
      const tr = document.createElement('tr');
      const vals = [body.stncode, body.shortname, body.saleno, body.gname, body.mobilephone, body.name, body.ctc, body.ttc,
        (body.questiondata?.length ? body.questiondata[body.questiondata.length-1].answercontent : ''), row.created_at];
      vals.forEach(v => {
        const td = document.createElement('td');
        td.textContent = v || '';
        if (v && v.length > 15) td.title = v;
        tr.appendChild(td);
      });
      fragment.appendChild(tr);
    });
    tbody.appendChild(fragment);
  }

  async function loadCurrentMonthData() {
    await fetchAllLogs();
    const select = document.getElementById('monthSelect');
    if (select.value) {
      await updateSummaryAndTable(select.value);
    } else {
      document.getElementById('summaryInline').textContent = T.siteSummaryNone;
    }
  }

    document.getElementById('closeAdminPanel').onclick = () => overlay.remove();

      document.getElementById('doAddAdmin').onclick = async () => {
        const email = document.getElementById('newAdminEmail').value.trim();
        const password = document.getElementById('newAdminPassword').value;
        const msgEl = document.getElementById('adminPanelMsg');
        msgEl.textContent = '';
        if (!email || !password || password.length < 6) {
          msgEl.textContent = '请输入有效邮箱和至少6位密码';
          return;
        }
        try {
          const res = await fetch(`${SUPABASE_URL}/functions/v1/create-admin-user`, {

            headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },

          if (!res.ok) throw new Error(result.error);

        const email = this.dataset.email;

        if (!newPassword || newPassword.length < 6) {
          alert('密码不能为空且至少6位');
          return;

          const { data, error } = await supabase.functions.invoke('reset-user-password', {
            method: 'POST',

          });
          if (error) throw new Error(error.message);

          } else {

            method: 'POST',
            headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId })
          });
          const result = await res.json();
          if (!res.ok) throw new Error(result.error);
          alert('用户已删除');
          overlay.remove();
          showAdminPanel();
        } catch (err) {
          alert('删除失败：' + err.message);
        }
      });
    });
  }

  async function batchCreateAccounts() {
    const btn = document.getElementById('batchCreateBtn');
    const originalText = btn.innerText;
    try {
      btn.innerText = '生成中...';
      btn.disabled = true;
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) throw new Error('未登录');
      const res = await fetch(`${SUPABASE_URL}/functions/v1/batch-create-accounts`, {
        method: 'POST', headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' }
      });
      const contentType = res.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        const json = await res.json();
        alert(res.ok ? (json.message || json.error || '操作完成') : ('错误：' + (json.error || json.message || '未知错误')));
        return;
      }
      if (!res.ok) throw new Error(await res.text());
      const blob = await res.blob();
      if (blob.type === 'application/json') {
        const text = await blob.text();
        try { const json = JSON.parse(text); alert(json.message || json.error || '操作完成'); } catch { alert(text); }
        return;
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'accounts.csv';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      alert('批量生成完成，CSV 文件已下载。');
    } catch (err) { console.error(err); alert('批量生成失败：' + err.message); }
    finally { btn.innerText = originalText; btn.disabled = false; }
  }

                const end = s.enddate ? s.enddate.slice(0,10) : '';
                const isEnabled = (start <= today && today <= end);
                return `<div class="station-item"><input type="checkbox" value="${s.id}" id="chk_${s.id}"><label for="chk_${s.id}">${s.stncode} - ${s.shortname} (区间: ${start||'无'} ~ ${end||'无'}) ${isEnabled ? '✅启用中' : '❌已禁用'}</label></div>`;
              }).join('')}
            </div>
            <div class="batch-action-buttons">
              <button id="applyDateToSelected" class="btn-primary">📅 应用到选中</button>
              <button id="applyDateToAll" class="btn-primary">📅 应用到全部</button>
              <button id="cancelBatchBtn" class="btn-danger">取消</button>
            </div>
          </div>
        </div>
        <p id="configMsg" class="error"></p>
      </div>
    `;
    document.body.appendChild(overlay);
    const closeModal = () => overlay.remove();
    document.getElementById('closeConfigModal').onclick = closeModal;
    document.getElementById('cancelConfigBtn').onclick = closeModal;
    document.getElementById('cancelConfigBtn2').onclick = closeModal;
    document.getElementById('cancelBatchBtn').onclick = closeModal;

    const tabEdit = document.getElementById('tabEdit'), tabCreate = document.getElementById('tabCreate'), tabBatch = document.getElementById('tabBatch');
    const panelEdit = document.getElementById('panelEdit'), panelCreate = document.getElementById('panelCreate'), panelBatch = document.getElementById('panelBatch');
    function setActiveTab(active) {
      [tabEdit, tabCreate, tabBatch].forEach(t => t.classList.remove('active'));
      [panelEdit, panelCreate, panelBatch].forEach(p => p.classList.remove('active'));
      if (active === 'edit') { tabEdit.classList.add('active'); panelEdit.classList.add('active'); }
      else if (active === 'create') { tabCreate.classList.add('active'); panelCreate.classList.add('active'); }
      else { tabBatch.classList.add('active'); panelBatch.classList.add('active'); }
    }
    tabEdit.onclick = () => setActiveTab('edit');
    tabCreate.onclick = () => setActiveTab('create');
    tabBatch.onclick = () => setActiveTab('batch');

    const getField = id => document.getElementById(id);
    const setField = (id, val) => { const f = getField(id); if (f) f.value = val !== undefined ? val : ''; };
    const getFieldVal = id => getField(id).value;

    const newFields = ['transactionorgcode','usedcount','count','startdate','enddate','lastresetdate','user_id','fuelmappings','cardnoarray'];
    const getNewFieldVal = (key) => document.getElementById('new' + key.charAt(0).toUpperCase() + key.slice(1)).value;
    const setNewField = (key, val) => { const el = document.getElementById('new' + key.charAt(0).toUpperCase() + key.slice(1)); if (el) el.value = val; };
    const DEFAULT_FUEL_MAPPINGS = "gcode:60518727,gname:95号车用汽油(ⅥB), gcode:60518726,gname:92号车用汽油(ⅥB),gcode:60514943,gname:0号车用柴油(VI), gcode:60518728,gname:98号车用汽油(ⅥA)(ⅥB)";
    const DEFAULT_CARDNO_ARRAY = "1000419000000071231,1000419000000064385,1000419000000066590,1000419000000069220,1000419000000072814,1000419000000072810,1000419000000072820,1000419000000072783";
    const DEFAULT_TRANSACTION_ORG_CODE = "44";
    const DEFAULT_STARTDATE = new Date().toISOString().slice(0,10);
    const DEFAULT_ENDDATE = "2099-12-31";

    function clearEditFields() { newFields.forEach(f => setField(f, '')); }
    function setDefaultCreateFields() {
      setNewField('fuelmappings', DEFAULT_FUEL_MAPPINGS);
      setNewField('cardnoarray', DEFAULT_CARDNO_ARRAY);
      setNewField('transactionorgcode', DEFAULT_TRANSACTION_ORG_CODE);
      setNewField('usedcount', '');
      setNewField('count', '');
      setNewField('startdate', DEFAULT_STARTDATE);
      setNewField('enddate', DEFAULT_ENDDATE);
      setNewField('lastresetdate', '');
      setNewField('user_id', '');
    }
    async function loadStationForEdit(stationId) {
      if (!stationId) { clearEditFields(); return; }
      try {
        const { data, error } = await supabase.from('stations').select('*').eq('id', stationId).single();
        if (error) throw error;
        if (data) {
          setField('transactionorgcode', data.transactionorgcode || '');
          setField('usedcount', data.usedcount ?? '');
          setField('count', data.count ?? '');
          setField('startdate', data.startdate ? data.startdate.slice(0,10) : '');
          setField('enddate', data.enddate ? data.enddate.slice(0,10) : '');
          setField('lastresetdate', data.lastresetdate ? data.lastresetdate.slice(0,10) : '');
          setField('user_id', data.user_id || '');
          setField('fuelmappings', data.fuelmappings || '');
          setField('cardnoarray', data.cardnoarray || '');
        }
      } catch (err) { document.getElementById('configMsg').textContent = '加载失败: ' + err.message; }
    }
    const stationSelect = document.getElementById('stationSelect');
    stationSelect.addEventListener('change', (e) => { currentEditStationId = e.target.value; if (currentEditStationId) loadStationForEdit(currentEditStationId); else clearEditFields(); });

    document.getElementById('saveEditBtn').onclick = async () => {
      const msg = document.getElementById('configMsg'); msg.textContent = '';
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { msg.textContent = '未登录'; return; }
      if (!currentEditStationId) { msg.textContent = '请选择一个站点'; return; }
      const config = {};
      newFields.forEach(f => { const val = getFieldVal(f); if (val !== '') config[f] = (f === 'usedcount' || f === 'count') ? parseInt(val) : val; });
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/update-station-config`, {
          method: 'POST', headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ stationId: currentEditStationId, config })
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        alert('更新成功'); closeModal();
      } catch (err) { msg.textContent = '保存失败: ' + err.message; }
    };
    document.getElementById('saveCreateBtn').onclick = async () => {
      const msg = document.getElementById('configMsg'); msg.textContent = '';
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { msg.textContent = '未登录'; return; }
      const stncode = document.getElementById('newStncode').value.trim();
      const shortname = document.getElementById('newShortname').value.trim();
      if (!stncode || !shortname) { msg.textContent = '站点编码和简称为必填'; return; }
      const newStation = { stncode, shortname };
      newFields.forEach(f => { const val = getNewFieldVal(f); if (val !== '') newStation[f] = (f === 'usedcount' || f === 'count') ? parseInt(val) : val; });
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/create-station`, {
          method: 'POST', headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(newStation)
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        alert('新增成功'); closeModal();
      } catch (err) { msg.textContent = '新增失败: ' + err.message; }
    };

    async function updateStationsDates(stationIds, startdate, enddate) {
      if (!stationIds.length) { alert('没有选中任何站点'); return false; }
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { alert('未登录'); return false; }
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/update-stations-dates`, {
          method: 'POST', headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ stationIds, startdate, enddate })
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        alert(`成功更新 ${result.updatedCount} 个站点`);
        return true;
      } catch (err) { alert('批量更新失败: ' + err.message); return false; }
    }
    function getSelectedIds() {
      return Array.from(document.querySelectorAll('#stationChecklist input[type="checkbox"]:checked')).map(cb => cb.value);
    }
    async function refreshStationList() {
      const { data, error } = await supabase.from('stations').select('id, stncode, shortname, startdate, enddate');
      if (!error && data) {
        stationsList = data;
        const container = document.getElementById('stationChecklist');
        const today = new Date().toISOString().slice(0,10);
        container.innerHTML = stationsList.map(s => {
          const start = s.startdate ? s.startdate.slice(0,10) : '';
          const end = s.enddate ? s.enddate.slice(0,10) : '';
          const isEnabled = (start <= today && today <= end);
          return `<div class="station-item"><input type="checkbox" value="${s.id}" id="chk_${s.id}"><label for="chk_${s.id}">${s.stncode} - ${s.shortname} (区间: ${start||'无'} ~ ${end||'无'}) ${isEnabled ? '✅启用中' : '❌已禁用'}</label></div>`;
        }).join('');
      }
    }
    const todayStr = new Date().toISOString().slice(0,10);
    const farFuture = '2099-12-31';
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yesterdayStr = yesterday.toISOString().slice(0,10);
    document.getElementById('enableAllBtn').onclick = async () => { if (await updateStationsDates(stationsList.map(s=>s.id), todayStr, farFuture)) await refreshStationList(); };
    document.getElementById('disableAllBtn').onclick = async () => { if (await updateStationsDates(stationsList.map(s=>s.id), null, yesterdayStr)) await refreshStationList(); };
    document.getElementById('enableSelectedBtn').onclick = async () => { const ids = getSelectedIds(); if (!ids.length) alert('请先勾选'); else if (await updateStationsDates(ids, todayStr, farFuture)) await refreshStationList(); };
    document.getElementById('disableSelectedBtn').onclick = async () => { const ids = getSelectedIds(); if (!ids.length) alert('请先勾选'); else if (await updateStationsDates(ids, null, yesterdayStr)) await refreshStationList(); };
    document.getElementById('applyDateToSelected').onclick = async () => {
      const start = document.getElementById('customStartDate').value, end = document.getElementById('customEndDate').value;
      if (!start || !end) { alert('请填写完整日期'); return; }
      const ids = getSelectedIds(); if (!ids.length) { alert('请先勾选站点'); return; }
      if (await updateStationsDates(ids, start, end)) await refreshStationList();
    };
    document.getElementById('applyDateToAll').onclick = async () => {
      const start = document.getElementById('customStartDate').value, end = document.getElementById('customEndDate').value;
      if (!start || !end) { alert('请填写完整日期'); return; }
      if (await updateStationsDates(stationsList.map(s=>s.id), start, end)) await refreshStationList();
    };
  }

  // 事件绑定
  function bindEvents() {
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('togglePwd').addEventListener('click', togglePasswordVisibility);
    document.getElementById('adminBtn').addEventListener('click', showAdminPanel);
    document.getElementById('batchCreateBtn').addEventListener('click', batchCreateAccounts);
    document.getElementById('configBtn').addEventListener('click', showStationConfig);

    document.getElementById('applyFilterBtn').onclick = async () => {
      const stncode = document.getElementById('stncodeFilter').value.trim();
      currentFilterStncode = stncode;
      allLogsCache = null;
      await updateSummaryAndTable(document.getElementById('monthSelect').value);
    };
    document.getElementById('resetFilterBtn').onclick = async () => {
      document.getElementById('stncodeFilter').value = '';
      currentFilterStncode = '';
      allLogsCache = null;
      await updateSummaryAndTable(document.getElementById('monthSelect').value);
    };
  }

  buildUI();
  bindEvents();

  (async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) await showData(); else showLogin();
  })();
})();
</script>
</body>
</html>
